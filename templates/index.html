<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logbook</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f7f7f8;
        color: #202124;
      }

      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 1rem;
        box-sizing: border-box;
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }

      p {
        margin: 0.25rem 0 0.75rem;
        color: #5f6368;
        font-size: 0.9rem;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      label {
        font-size: 0.9rem;
        color: #3c4043;
      }

      textarea {
        width: 100%;
        min-height: calc(100dvh - 11rem);
        box-sizing: border-box;
        border: 1px solid #dadce0;
        border-radius: 0.75rem;
        padding: 0.9rem;
        resize: vertical;
        font-size: 1rem;
        line-height: 1.45;
        overflow: auto;
      }

      button {
        align-self: flex-end;
        border: 0;
        border-radius: 999px;
        padding: 0.55rem 1rem;
        font-weight: 600;
        background: #1a73e8;
        color: #fff;
      }

      .message {
        min-height: 1.2rem;
        font-size: 0.85rem;
        color: #188038;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Daily Note</h1>
      <p>{{ date }}. Write, save, and continue anytime today.</p>
      <form method="post" onsubmit="this.setAttribute('aria-busy','true');this.querySelector('button').disabled=true;this.querySelector('button').textContent='Saving...';">
        <label for="note">Note</label>
        <textarea id="note" name="note" wrap="soft" placeholder="Write anything...">{{ note | e }}</textarea>
        <div class="message" aria-live="polite">{{ message }}</div>
        <button type="submit">Save</button>
      </form>
    </main>
  </body>
</html>
